server {
    listen 80;
    listen [::]:80;
    server_name codego.eu.org;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name codego.eu.org;

    ssl_certificate /etc/nginx/cert/codego.eu.org.pem;
    ssl_certificate_key /etc/nginx/cert/codego.eu.org.key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20m;

    # All requests go through Next.js.
    # API proxying is handled by Next.js rewrites (next.config.ts).
    # No per-route nginx config needed.

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100/_next/static/;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600, immutable";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
